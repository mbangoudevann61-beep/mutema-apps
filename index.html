<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

<script>
  // Remplacez ces lignes par vos propres clés trouvées dans la console Firebase
  const firebaseConfig = {
    apiKey: "VOTRE_API_KEY",
    authDomain: "VOTRE_PROJET.firebaseapp.com",
    databaseURL: "VOTRE_DATABASE_URL",
    projectId: "VOTRE_PROJET_ID",
    storageBucket: "VOTRE_PROJET.appspot.com",
    messagingSenderId: "VOTRE_ID",
    appId: "VOTRE_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // CONFIGURATION DES IDENTIFIANTS COMMUNS
  const ADMIN_ID = "MUTEMA_ADMIN";
  const PASS_KEY = "Mutema2026!Global";

  /**
   * Fonction pour sauvegarder les informations de gestion
   */
  function sauvegarderGestion(titreAction, details) {
    database.ref('gestion_projet').set({
      utilisateur: ADMIN_ID,
      action: titreAction,
      description: details,
      access_key: PASS_KEY, // Le mot de passe qui valide l'écriture
      date: new Date().toLocaleString('fr-FR')
    })
    .then(() => {
      console.log("Synchronisation réussie sur tous les appareils !");
    })
    .catch((error) => {
      console.error("Erreur de permission :", error.message);
    });
  }

  /**
   * Lecture automatique : ce qui s'affiche sur le téléphone
   */
  database.ref('gestion_projet').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      console.log("Mise à jour reçue :", data.action);
      // Exemple : mettre à jour un élément HTML avec l'ID 'status'
      // document.getElementById('status').innerHTML = "Dernière action : " + data.action;
    }
  });
</script>
