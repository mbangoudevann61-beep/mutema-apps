<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

<script>
  // Configuration (Remplace avec tes vraies infos Firebase)
  const firebaseConfig = {
    apiKey: "VOTRE_API_KEY",
    authDomain: "VOTRE_PROJET.firebaseapp.com",
    databaseURL: "VOTRE_DATABASE_URL",
    projectId: "VOTRE_PROJET_ID",
    storageBucket: "VOTRE_PROJET.appspot.com",
    messagingSenderId: "VOTRE_ID",
    appId: "VOTRE_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const ADMIN_ID = "MUTEMA_ADMIN";
  const PASS_KEY = "Mutema2026!Global"; // MOT DE PASSE COMMUN

  // Cette fonction synchronise ton projet
  function synchroniser(titre, texte) {
    database.ref('gestion_projet').set({
      utilisateur: ADMIN_ID,
      titre: titre,
      description: texte,
      access_key: PASS_KEY,
      date: new Date().toLocaleString('fr-FR')
    }).then(() => {
      console.log("Synchronisé !");
    }).catch((e) => {
      console.error("Erreur : ", e.message);
    });
  }

  // Écoute en temps réel pour ton téléphone
  database.ref('gestion_projet').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && document.getElementById('affichage-sync')) {
      document.getElementById('affichage-sync').innerHTML = "Dernière mise à jour : " + data.titre;
    }
  });
</script>
