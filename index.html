<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTEMA - Rigueur & Discipline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-color: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Design du bouton Paramètres (Roue dentée) */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .settings-btn:hover {
            transform: rotate(90deg);
        }

        /* Fenêtre des paramètres (Modal) */
        #settingsModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #151921;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--primary-color);
            z-index: 2000;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 20px;
        }

        .local-mode { background: #ffcc00; color: black; }
        .online-mode { background: #00ff88; color: black; }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0a0b10;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        button.save-btn {
            background: var(--primary-color);
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Animation de fond */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <button class="settings-btn" onclick="openSettings()">
        <i class="fas fa-cog fa-2x"></i>
    </button>

    <header style="text-align: center;">
        <h1 style="color: var(--primary-color); margin-bottom: 5px;">MUTEMA</h1>
        <p style="font-style: italic; opacity: 0.8;">Rigueur & Discipline</p>
        <div id="connectionStatus" class="status-badge local-mode">Mode : Version Locale (Hors-ligne)</div>
    </header>

    <div id="settingsModal">
        <h2 style="margin-top: 0;">Paramètres Système</h2>
        
        <label>URL Base de Données (Firebase) :</label>
        <input type="text" id="dbUrl" placeholder="https://votre-projet.firebaseio.com">
        
        <label>Historique des activités :</label>
        <div id="historyLogs" style="height: 100px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.8em; margin-bottom: 15px;">
            -- Aucun historique disponible --
        </div>

        <button class="save-btn" onclick="saveSettings()">ACTIVER LA CONNEXION</button>
        <button onclick="closeSettings()" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">Fermer</button>
    </div>

    <main>
        <p style="text-align: center; margin-top: 50px;">Bienvenue dans l'espace de gestion de l'association.</p>
    </main>

    <script>
        function openSettings() {
            const code = prompt("Entrez le code d'accès administrateur :");
            if (code === "1604") {
                document.getElementById('settingsModal').style.display = 'block';
            } else {
                alert("Code incorrect ! Access refusé.");
            }
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function saveSettings() {
            const url = document.getElementById('dbUrl').value;
            if (url.includes("firebaseio.com")) {
                localStorage.setItem('mutema_db_url', url);
                alert("Connexion enregistrée ! L'application va maintenant tenter de se synchroniser.");
                location.reload(); // Recharge pour appliquer
            } else {
                alert("Veuillez entrer une URL Firebase valide.");
            }
        }

        // Vérification de la connexion au chargement
        window.onload = function() {
            const savedUrl = localStorage.getItem('mutema_db_url');
            const statusBadge = document.getElementById('connectionStatus');
            if (savedUrl) {
                statusBadge.innerHTML = "Mode : Connecté au Réseau";
                statusBadge.className = "status-badge online-mode";
                document.getElementById('dbUrl').value = savedUrl;
            }
        };
    </script>
</body>
</html>
