<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTEMA - Rigueur Discipline Entraide</title>
    <style>
        :root {
            --bleu-logo: #003366;
            --vert-logo: #2E8B57;
            --dore-logo: #DAA520;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #001529 0%, #000814 100%);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animation des cœurs aux couleurs officielles */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            animation: float 15s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* En-tête Doré Pro */
        header {
            text-align: center;
            padding: 30px 10px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--dore-logo);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            background: linear-gradient(to bottom, #FFD700, #DAA520);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(218, 165, 32, 0.3);
            letter-spacing: 5px;
        }

        .slogan {
            color: var(--dore-logo);
            font-style: italic;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Bureau */
        .bureau-header {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .bureau-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--vert-logo);
        }

        /* Menu de navigation optimisé mobile */
        nav {
            display: flex;
            justify-content: center;
            background: var(--bleu-logo);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px;
            overflow-x: auto;
            border-bottom: 2px solid var(--vert-logo);
        }

        nav button {
            background: none;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        nav button:hover { color: var(--dore-logo); }

        .container {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .section { display: none; background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 15px; }
        .active { display: block; }

        /* Configuration */
        .settings-btn {
            background: none;
            border: none;
            color: var(--dore-logo);
            font-size: 1.5em;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts"></div>

    <header>
        <h1>MUTEMA</h1>
        <div class="slogan">Rigueur • Discipline • Entraide</div>
        <div class="bureau-header">
            <div class="bureau-item">👑 Kamara (P)</div>
            <div class="bureau-item">📢 Devann (CC)</div>
            <div class="bureau-item">💰 Bermine (T)</div>
            <div class="bureau-item">⚖️ Caprisse (CD)</div>
        </div>
    </header>

    <nav>
        <button onclick="show('accueil')">🏠 Accueil</button>
        <button onclick="show('mur')">📢 Mur</button>
        <button onclick="show('projets')">📂 Projets</button>
        <button onclick="show('calculateur')">⏱️ Retard</button>
        <button onclick="show('reglement')">📜 Règlement</button>
        <button onclick="show('gestion')">💼 Gestion</button>
        <button onclick="show('config')">⚙️</button>
    </nav>

    <div class="container">
        <div id="accueil" class="section active">
            <h2>Bienvenue chez MUTEMA</h2>
            <p>Ici bat le cœur de notre association. Utilisez le menu pour naviguer.</p>
        </div>

        <div id="mur" class="section">
            <h2>Mur d'annonces</h2>
            <div id="mur-display">Chargement...</div>
        </div>

        <div id="config" class="section">
            <h2>Paramètres de Connexion</h2>
            <p>Entrez le lien Firebase pour activer le réseau.</p>
            <input type="password" id="config-pass" placeholder="Code 1604">
            <button onclick="unlockConfig()">Accéder</button>
            <div id="config-panel" style="display:none; margin-top:20px;">
                <input type="text" id="fb-url" placeholder="https://votre-base.firebaseio.com/" style="width:80%;">
                <button onclick="saveFB()">Valider le lien</button>
            </div>
        </div>
    </div>

    <script>
        // Animation des cœurs
        const container = document.getElementById('hearts');
        const colors = ['#003366', '#2E8B57', '#DAA520'];
        for (let i = 0; i < 30; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💙';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDelay = Math.random() * 15 + 's';
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            container.appendChild(heart);
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function unlockConfig() {
            if(document.getElementById('config-pass').value === '1604') {
                document.getElementById('config-panel').style.display = 'block';
            } else { alert('Code erroné'); }
        }

        function saveFB() {
            const url = document.getElementById('fb-url').value;
            if(url) {
                localStorage.setItem('mutema_fb_url', url);
                alert('Connexion enregistrée ! Redémarrage...');
                location.reload();
            }
        }
    </script>
</body>
</html>
